# Shopify app config for CLI (`shopify app dev`, `shopify app deploy`).
# First time: run `shopify app config link` (or `shopify app dev`) to set `client_id` and sync Partner Dashboard.
# URLs below are placeholders; with `automatically_update_urls_on_dev`, CLI can rewrite them when tunneling.

name = "nextjs-shopify-app"
handle = "nextjs-shopify-app"
client_id = "00000000000000000000000000000000"
application_url = "https://example.com/shopify/app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[access_scopes]
scopes = "read_products,write_products"

[auth]
redirect_urls = [
  "https://example.com/api/shopify/auth/callback",
]
